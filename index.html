<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Speedruns Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-header">
            <span class="icon">🟢</span>
            <span>MC Speedruns</span>
        </div>
        <ul class="nav-links">
            <li class="active" onclick="goBack()">🏆 Speedruns</li>
            <li onclick="alert('Sekcja w budowie!')">👥 Players</li>
            <li onclick="alert('Sekcja w budowie!')">🛠️ Staff</li>
        </ul>
        <div class="sidebar-footer">
            <a href="#" class="nav-item">💬 Discord</a>
            <a href="#" class="nav-item">🧧 Patreonite</a>
        </div>
    </nav>

    <main class="main-content">
        <div id="category-section">
            <h1>Wybierz kategorię</h1>
            <div class="category-grid">
                <div class="cat-card" onclick="loadCategory('any-ng')">
                    <img src="https://minecraft.wiki/images/Grass_Block_JE7_BE4.png" alt="Any% NG">
                    <span>Any% NG</span>
                </div>
                <div class="cat-card" onclick="loadCategory('golden-dandelion')">
                    <img src="https://minecraft.wiki/images/Dandelion_JE4_BE3.png" alt="Golden Dandelion">
                    <span>Golden Dandelion</span>
                </div>
            </div>
        </div>

        <div id="ranking-display" style="display: none;"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
