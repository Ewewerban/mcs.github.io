<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>MC Speedruns</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-header">🟢 MC Speedruns</div>
        <ul class="nav-links">
            <li class="active" onclick="showSection('categories')">🏆 Speedruns</li>
            <li onclick="showSection('players')">👥 Players</li>
            <li onclick="showSection('staff')">🛠️ Staff</li>
        </ul>
        <button class="add-run-btn" onclick="openModal()" style="margin-top:20px; cursor:pointer;">+ Dodaj Speedrun</button>
    </nav>

    <main class="main-content">
        <div id="categories-section" class="content-view">
            <h1>Wybierz kategorię</h1>
            <div class="category-grid">
                <div class="cat-card" onclick="loadCategory('any-ng')">Any% NG</div>
                <div class="cat-card" onclick="loadCategory('golden-dandelion')">Golden Dandelion</div>
            </div>
        </div>
        <div id="ranking-view" class="content-view" style="display:none;"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
