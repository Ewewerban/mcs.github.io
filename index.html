<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Speedruns Leaderboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-header">🏆 MC Speedruns</div>
        <ul class="nav-links">
            <li id="nav-categories" class="active" onclick="showSection('categories')">🏆 Leaderboards</li>
        </ul>
        <div class="sidebar-footer">
            <button class="add-run-btn" onclick="openModal()">+ Submit Run</button>
        </div>
    </nav>

    <main class="main-content">
        <div id="categories-section" class="content-view">
            <h1>Select Category</h1>
            <div class="category-grid">
                <div class="cat-card" onclick="loadCategory('any-ng')">
                    <span>Any% NG</span>
                </div>
                <div class="cat-card" onclick="loadCategory('golden-dandelion')">
                    <span>Golden Dandelion</span>
                </div>
            </div>
        </div>

        <div id="ranking-view" class="content-view" style="display: none;"></div>
    </main>

    <div id="addModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 style="color: #7ca352;">Submit Your Run</h2>
            <p>Send your proof to: <strong>ewewerban@gmail.com</strong></p>
            <button onclick="closeModal()" class="action-btn">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
