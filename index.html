<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Speedruns</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-header">🏆 MC Speedruns</div>
        <ul class="nav-links">
            <li id="nav-categories" class="active" onclick="showSection('categories')">🏆 Speedruns</li>
            <li id="nav-players" onclick="showSection('players')">👥 Players</li>
            <li id="nav-editor" onclick="showSection('editor')">🖌️ Skin Editor</li>
            <li id="nav-staff" onclick="showSection('staff')">🛠️ Staff</li>
        </ul>
        <div class="sidebar-footer">
            <button class="add-run-btn" onclick="openModal()">+ Add Speedrun</button>
        </div>
    </nav>

    <main class="main-content">
        <div id="categories-section" class="content-view">
            <h1>Select category</h1>
            <div class="category-grid">
                <div class="cat-card" onclick="loadCategory('any-ng')"><span>Any% NG</span></div>
                <div class="cat-card" onclick="loadCategory('golden-dandelion')"><span>Golden Dandelion</span></div>
            </div>
        </div>

        <div id="ranking-view" class="content-view" style="display: none;"></div>

        <div id="players-section" class="content-view" style="display: none;">
            <h1>Player Searcher</h1>
            <input type="text" id="playerSearch" placeholder="Wpisz nick..." onkeyup="filterPlayers()" class="modern-input">
            <div id="players-container" class="players-grid"></div>
        </div>

        <div id="editor-section" class="content-view" style="display: none;">
            <h1>Skin Workshop</h1>
            <div class="editor-frame-container">
                <iframe src="https://minecraft.novaskin.me/resourcepacks#google_vignette" class="skin-iframe"></iframe>
            </div>
        </div>

        <div id="staff-section" class="content-view" style="display: none;">
            <h1>Staff Members</h1>
            <div id="staff-container"></div>
        </div>
    </main>

    <div id="addModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Add record</h2>
            <p>send proof to: <strong>ewewerban@gmail.com</strong></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
