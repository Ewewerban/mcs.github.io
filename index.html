<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>MC Speedruns Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-header">🟢 MC Speedruns</div>
        <ul class="nav-links">
            <li class="active" onclick="showSection('categories')">🏆 Speedruns</li>
            <li onclick="showSection('players')">👥 Players</li>
            <li onclick="showSection('staff')">🛠️ Staff</li>
        </ul>
        <div class="sidebar-footer">
            <button class="add-run-btn" onclick="openModal()">➕ Dodaj Speedrun</button>
            <a href="#" class="nav-item">💬 Discord</a>
        </div>
    </nav>

    <main class="main-content">
        <div id="categories-section" class="content-view">
            <h1>Wybierz kategorię</h1>
            <div class="category-grid">
                <div class="cat-card" onclick="loadCategory('any-ng')">
                    <img src="https://minecraft.wiki/images/Grass_Block_JE7_BE4.png">
                    <span>Any% NG</span>
                </div>
                <div class="cat-card" onclick="loadCategory('golden-dandelion')">
                    <img src="https://minecraft.wiki/images/Dandelion_JE4_BE3.png">
                    <span>Golden Dandelion</span>
                </div>
            </div>
        </div>

        <div id="ranking-view" class="content-view" style="display: none;"></div>

        <div id="staff-section" class="content-view" style="display: none;">
            <h1>Staff</h1>
            <div id="staff-container"></div>
        </div>
    </main>

    <div id="addModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Dodaj speedrun</h2>
            <p>1. Napisz do mnie na maila: <strong>ewewerban@gmail.com</strong></p>
            <p>2. Załącz nick, czas, nagranie oraz wersję.</p>
            <p>3. Czekaj na odpowiedź.</p>
            <button class="close-btn" onclick="closeModal()">Zamknij</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
