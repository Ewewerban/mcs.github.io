<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Speedruns Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-header">
            <span class="icon">🟢</span>
            <span>MC Speedruns</span>
        </div>
        <ul class="nav-links">
            <li id="nav-speedruns" class="active" onclick="showSection('categories')">🏆 Speedruns</li>
            <li id="nav-players" onclick="showSection('players')">👥 Players</li>
            <li id="nav-staff" onclick="showSection('staff')">🛠️ Staff</li>
        </ul>
        <div class="sidebar-footer">
            <button class="add-run-btn" onclick="openModal()">➕ Dodaj Speedrun</button>
            <a href="#" class="nav-item">💬 Discord</a>
        </div>
    </nav>

    <main class="main-content">
        <div id="categories-section" class="content-view">
            <h1>Wybierz kategorię</h1>
            <div class="category-grid">
                <div class="cat-card" onclick="loadCategory('any-ng')">
                    <span>Any% NG</span>
                </div>
                <div class="cat-card" onclick="loadCategory('golden-dandelion')">
                    <span>Golden Dandelion</span>
                </div>
            </div>
        </div>

        <div id="ranking-view" class="content-view" style="display: none;"></div>
        <div id="players-section" class="content-view" style="display: none;">
            <h1>Lista graczy</h1>
            <div id="players-container"></div>
        </div>
        <div id="staff-section" class="content-view" style="display: none;">
            <h1>Staff Members</h1>
            <div id="staff-container"></div>
        </div>
    </main>

    <div id="addModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 style="color: #7ca352;">Dodaj speedrun</h2>
            <p>Wyślij maila na: <strong>ewewerban@gmail.com</strong></p>
            <button class="close-btn-style" onclick="closeModal()">Zamknij</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
