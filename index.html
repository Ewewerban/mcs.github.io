<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Speedruns Leaderboard</title>
    <link rel="stylesheet" href="style.css">
    <meta name="referrer" content="no-referrer">
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-header">🏆 MC Speedruns</div>
        <ul class="nav-links">
            <li id="nav-categories" class="active" onclick="showSection('categories')">🏆 Leaderboards</li>
            <li id="nav-discord" onclick="showSection('discord')">💬 Discord</li>
        </ul>
        <div class="sidebar-footer">
            <button class="add-run-btn" onclick="openModal()">+ Submit Run</button>
        </div>
    </nav>

    <main class="main-content">
        <div id="categories-section" class="content-view">
            <h1>Select Category</h1>
            <div class="category-grid">
                <div class="cat-card" onclick="loadCategory('any-ng')">Any% NG</div>
                <div class="cat-card" onclick="loadCategory('golden-dandelion')">Golden Dandelion</div>
            </div>
        </div>

        <div id="discord-section" class="content-view" style="display: none;">
            <h1>Join Our Community</h1>
            <div class="discord-container">
                <iframe src="https://discord.com/widget?id=1481700436003127309&theme=dark" width="350" height="500" allowtransparency="true" frameborder="0" sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts"></iframe>
            </div>
        </div>

        <div id="ranking-view" class="content-view" style="display: none;"></div>
    </main>

    <div class="spotify-player-container">
        <iframe id="spotify-widget" 
            src="https://open.spotify.com/embed/track/1q9696vI396906uS9Y0Y67?utm_source=generator&theme=0" 
            width="100%" height="80" frameBorder="0" allowfullscreen="" 
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy">
        </iframe>
        <div class="spotify-nav">
            <button onclick="changeTrack(-1)">⏮ Previous</button>
            <button onclick="changeTrack(1)">Next ⏭</button>
        </div>
    </div>

    <div id="addModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 style="color: #7ca352;">Submit Your Run</h2>
            <p>Send your proof (video link) to: <br><strong>ewewerban@gmail.com</strong></p>
            <button onclick="closeModal()" class="action-btn">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
