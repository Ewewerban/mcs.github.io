<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>MCS Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="sidebar">
    <div class="sidebar-header">
        <span class="logo-icon">🟢</span> 
        <h3>MC Speedruns</h3>
    </div>

    <ul class="nav-links">
        <li class="active" onclick="showPage('speedruns')">
            <span class="icon">🏆</span> Speedruns
        </li>
        <li onclick="showPage('players')">
            <span class="icon">👥</span> Players
        </li>
        <li onclick="showPage('staff')">
            <span class="icon">🛠️</span> Staff
        </li>
    </ul>

    <div class="sidebar-footer">
        <a href="https://discord.gg/..." class="nav-item">
            <span class="icon">💬</span> Discord
        </li>
        <a href="#" class="nav-item">
            <span class="icon">🧧</span> Patreonite
        </li>
    </div>
</nav>

    <main class="main-content">
        <section id="speedruns">
            <h1>Kategorie</h1>
            <div class="category-grid">
                <div class="cat-card">Any% NG</div>
                <div class="cat-card">Golden Dandelion</div>
            </div>
            
            <h2 style="margin-top: 40px;">Best of Golden Dandelion</h2>
            <div class="rank-row top-1">
                <span style="width: 30px">1.</span>
                <strong>Ewewerban</strong>
                <span style="margin-left: auto">00:15.27</span>
            </div>
        </section>

        <section id="staff" style="display: none;">
            <h1>Staff Members</h1>
            </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
